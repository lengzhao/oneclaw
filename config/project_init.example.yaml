# 与仓库根 config.example.yaml 保持同步（oneclaw -init 通过 config 包嵌入）。
# 复制到 ~/.oneclaw/config.yaml 或 <cwd>/.oneclaw/config.yaml；合并与优先级见 docs/config.md。
# 入口 Load 之后会调用 config.ApplyEnvDefaults：仅当某个 ONCLAW_* 尚未设置时，才用 YAML 补全；
# 不会写入 OPENAI_API_KEY（密钥优先放在 openai.api_key，由客户端选项注入）。
#
# 环境变量仍可覆盖非敏感项（如 OPENAI_BASE_URL、ONCLAW_MODEL 等），规则见 docs/config.md。
# 「关闭类」 features.disable_*：true 为关闭；省略或 false 为开启（与 ONCLAW_DISABLE_* 的 0/1 语义对应）。

# -----------------------------------------------------------------------------
# OpenAI 兼容 API（openai-go 客户端）
# -----------------------------------------------------------------------------
openai:
  # 推荐在此填写；非空时优先于环境变量 OPENAI_API_KEY
  api_key: ""
  # 可选；自定义网关时设置，需包含 /v1/ 后缀。环境变量 OPENAI_BASE_URL 优先于本字段
  base_url: ""
  org_id: ""
  project_id: ""

# -----------------------------------------------------------------------------
# 模型与会话
# -----------------------------------------------------------------------------
model: gpt-4o

chat:
  # 空或 auto：流式失败则回退非流式；环境变量 ONCLAW_CHAT_TRANSPORT 优先
  transport: auto

# -----------------------------------------------------------------------------
# 日志（oneclaw -maintain-once 可用：-log-level、-log-format）
# -----------------------------------------------------------------------------
log:
  level: info
  format: text

# -----------------------------------------------------------------------------
# 路径（留空则使用各包默认，见 docs/config.md）
# -----------------------------------------------------------------------------
paths:
  # 留空则记忆根目录为 ~/.oneclaw
  memory_base: ""
  # 留空：transcript 为 <cwd>/.oneclaw/transcript.json
  transcript: ""
  # 留空：按日分文件写入 traces；以 .jsonl 结尾为单文件
  turn_log_path: ""

# -----------------------------------------------------------------------------
# 渠道实例（非空时仅启动列表中的项；id = Inbound.Source / Sink 注册键，type = 实现 Spec.Key）
# 省略本段或 channels: []：对每个已注册 Spec 各启一个实例，实例 id 默认为 Spec.Key（与仅配 cli 等价）
# -----------------------------------------------------------------------------
channels:
  # - id: cli
  #   type: cli
  # 本地静态页渠道：内嵌 HTML + POST /api/chat；仅监听本机。
  - id: localweb
    type: statichttp
    listen_addr: "127.0.0.1:8765"
    static_dir: "" # 非空则挂载为 http://<listen>/static/
    # POST /api/chat：application/json 或 multipart；附件落盘 .oneclaw/media/inbound/<UTC-YYYY-MM-DD>/，可按天删目录

  # Slack Socket Mode：id 即 Inbound.Source / Sink 键；需 Slack App 开启 Socket Mode 与对应权限。
  # - id: slack1
  #   type: slack
  #   bot_token: "xoxb-..."   # Bot User OAuth Token
  #   app_token: "xapp-..."   # App-Level Token（connections:write）
  #   # allow_from 为空则允许任意用户
  #   allow_from:
  #     - "U01234567"
  #   group_trigger:
  #     mention_only: false   # true：群内需 @ 机器人才响应
  #     prefixes: ["!", "/"]   # 非空时群聊仅当以此前缀开头时响应（mention 仍始终响应）

  # 飞书 / Lark 长连接（64 位架构）；is_lark: true 时使用 Lark 国际站 API。
  # - id: feishu1
  #   type: feishu
  #   app_id: "cli_xxx"
  #   app_secret: "..."
  #   verification_token: ""  # 事件订阅校验（可选）
  #   encrypt_key: ""         # 消息加密（可选）
  #   is_lark: false
  #   allow_from: []
  #   group_trigger:
  #     mention_only: true
  #     prefixes: []

# -----------------------------------------------------------------------------
# 功能开关（true = 关闭对应功能）
# -----------------------------------------------------------------------------
features:
  disable_memory: false
  disable_auto_memory: false
  disable_memory_extract: false
  disable_turn_log: false
  disable_transcript: false
  disable_auto_maintenance: false
  disable_memory_audit: false
  disable_context_budget: false

# -----------------------------------------------------------------------------
# 自动维护（将 daily log 蒸馏进 MEMORY.md）
# -----------------------------------------------------------------------------
# 代码上分为两入口：回合后 MaybePostTurnMaintain（近场）与定时 RunScheduledMaintain（oneclaw -maintain-once / cmd/maintain / 可选进程内 loop）。
# 回合后：ONCLAW_POST_TURN_MAINTENANCE_* 或 maintain.post_turn.*（经 ApplyEnvDefaults）。
# 进程内定时：仅当下面 interval 在 YAML 中非空时 oneclaw 才启动 maintainloop；留空则不启（避免默认多扣 API）。
# 未写 interval 时仍可用 oneclaw -maintain-once、cmd/maintain；间隔默认值见 MaintainLoopInterval。
# interval 模式（进程内 loop / cmd/maintain -interval）：远场 daily log 为增量（行内时间戳），状态 .oneclaw/scheduled_maintain_state.json。
# oneclaw -maintain-once / maintain -once：按天 LOG_DAYS 窗口。
maintain:
  # interval: 8h
  model: ""
  scheduled_model: ""
  max_tokens: 8192
  min_log_bytes: 200
  max_log_bytes: 24000
  # post_turn:
  #   min_log_bytes: 200          # Current turn 快照（格式化后）最小字节，不足则跳过近场维护
  #   memory_preview_bytes: 4000  # MEMORY.md 摘录上限（去重用）

# -----------------------------------------------------------------------------
# 上下文预算
# -----------------------------------------------------------------------------
budget:
  max_prompt_bytes: 220000
  min_transcript_messages: 6
  recall_max_bytes: 12000
