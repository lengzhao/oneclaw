# 默认配置：`oneclaw -init` 会将 `config/init_template/` 整棵复制到 ~/.oneclaw/（目标文件已存在则跳过）。
# 本文件也可手动复制到 ~/.oneclaw/config.yaml；合并与优先级见 docs/config.md。
# 入口 Load 后应调用 PushRuntime()：将合并结果写入 rtopts；运行时以 YAML 为准，不读 ONCLAW_* / OPENAI_* 环境变量做配置。
# 「关闭类」 features.disable_*：true 为关闭；省略或 false 为开启。

# -----------------------------------------------------------------------------
# OpenAI 兼容 API（openai-go 客户端）
# -----------------------------------------------------------------------------
openai:
  # 必填（运行需要）；由 config.OpenAIOptions 注入客户端
  api_key: ""
  # 可选；自定义网关时设置，需包含 /v1/ 后缀
  base_url: ""
  org_id: ""
  project_id: ""

# -----------------------------------------------------------------------------
# 模型与会话
# -----------------------------------------------------------------------------
model: gpt-4o

# 主会话：每回合模型调用步数（默认 100，范围 1–256）；每步 API max_completion_tokens（默认 32768，范围 1024–131072，0/省略=默认）。
# 最后一次步不传 tools，此前各步可正常工具调用。若网关/模型上限更低，请把 max_tokens 改小。
agent:
  max_steps: 100
  max_tokens: 32768

# -----------------------------------------------------------------------------
# 日志（oneclaw 可用：-log-level、-log-format、-log-file）
# -----------------------------------------------------------------------------
log:
  level: info
  format: text
  # 可选：除 stderr 外追加落盘（UTF-8）；相对路径相对 UserDataRoot（默认 ~/.oneclaw）
  # file: "oneclaw.log"

# -----------------------------------------------------------------------------
# 路径（留空则使用各包默认，见 docs/config.md）
# -----------------------------------------------------------------------------
paths:
  # 留空则记忆根目录为 ~/.oneclaw
  memory_base: ""
  # 留空：全局默认 transcript 为 <UserDataRoot>/transcript.json；cmd/oneclaw IM 每会话见 sessions 段
  transcript: ""
  # 留空：全局默认 working_transcript 为 <UserDataRoot>/working_transcript.json（与内存 Messages 一致：用户可见对话，无 tool 轮次）
  working_transcript: ""
  # 写入 working_transcript 时最多保留的尾部消息条数；0=默认 30；负数=不限制
  working_transcript_max_messages: 0

# -----------------------------------------------------------------------------
# 多会话（IM 线程隔离）；cmd/oneclaw 使用 TurnHub：每会话单 actor + turn_policy；每轮仍新建 Engine（见 session.TurnHub）。
# 转写文件：<UserDataRoot>/sessions/<stable_id>/transcript.json 与 working_transcript.json（与下方 paths.transcript 覆盖关系见 docs/config.md）。
# isolate_workspace：true 时每个会话 Engine.CWD 为 sessions/<id>/workspace；false（默认）时 CWD 为 <UserDataRoot>/workspace，多会话共享同一 workspace。
# -----------------------------------------------------------------------------
sessions:
  # 入站编排：serial（默认）| insert（同轮纯文本步间插入 messages）| preempt（新入站收缩当轮 effective max_steps；/stop 仍为硬取消）
  # turn_policy: serial
  # false：共享 <UserDataRoot>/workspace；true：每会话 <UserDataRoot>/sessions/<id>/workspace
  isolate_workspace: false

# -----------------------------------------------------------------------------
# IM 总线（github.com/lengzhao/clawbridge）；形状与 clawbridge config.Config 一致，见该仓库 config.example.yaml。
# client id = bus.InboundMessage.Channel / OutboundMessage.ClientID；driver = feishu | slack | noop | webchat | …
# media.root 留空则运行时使用 <UserDataRoot>/media（见 clawbridge 适配）。
# 至少配置一个 client，否则 oneclaw 无法启动 IM 宿主循环。
# -----------------------------------------------------------------------------
clawbridge:
  media:
    root: ""
  clients:
    # Slack Socket Mode
    # - id: slack-bot-1
    #   driver: slack
    #   enabled: true
    #   options:
    #     bot_token: "xoxb-..."
    #     app_token: "xapp-..."
    #     allow_from: ["*"]
    #     group_trigger:
    #       mention_only: true
    #       prefixes: ["/ask"]

    # 飞书 WebSocket
    # - id: feishu-bot-1
    #   driver: feishu
    #   enabled: true
    #   options:
    #     app_id: "cli_xxx"
    #     app_secret: "..."
    #     verification_token: ""
    #     encrypt_key: ""
    #     is_lark: false
    #     allow_from: ["*"]
    #     group_trigger:
    #       mention_only: true
    #       prefixes: ["/ask", "/bot"]

    # 占位（无真实 IM，仅用于联调进程启动；无入站消息）
    - id: noop-1
      driver: noop
      enabled: true
      options: {}
    - id: webchat-1
      driver: webchat
      enabled: true
      options:
        display_name: You
        listen: "127.0.0.1:8765"
        path: /

# -----------------------------------------------------------------------------
# MCP 工具（连接外部 MCP Server；需显式 enabled: true）
# 实现：github.com/modelcontextprotocol/go-sdk；传输 stdio / sse / http 与 picoclaw 对齐。
# 工具名注册为 mcp_<server>_<tool>；超长结果可落盘 workspace 或 InstructionRoot 下 artifacts/mcp/（见实现）
# -----------------------------------------------------------------------------
# mcp:
#   enabled: true
#   max_inline_text_runes: 16384
#   servers:
#     demo:
#       enabled: true
#       command: npx
#       args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
#       # type: stdio          # 可省略（有 command 时默认 stdio）
#     # remote:
#     #   enabled: true
#     #   type: sse            # 或 http（仅请求-响应、无独立 SSE 流）
#     #   url: "https://example.com/mcp"
#     #   headers:
#     #     Authorization: "Bearer ..."

# -----------------------------------------------------------------------------
# 功能开关（true = 关闭对应功能）
# -----------------------------------------------------------------------------
features:
  disable_memory: false
  disable_auto_memory: false
  disable_transcript: false
  disable_context_budget: false
  # true：入站图片不注入 Chat Completions 的 image_url（仅 read_file 路径提示）
  disable_multimodal_image: false
  # true：入站 wav/mp3 不注入 input_audio（仅 read_file 路径提示）
  disable_multimodal_audio: false

# -----------------------------------------------------------------------------
# 上下文预算（UTF-8 字节；关闭：features.disable_context_budget；详释见 docs/config.md）
# -----------------------------------------------------------------------------
budget:
  # 整轮上下文「总盘子」上限（含系统提示、注入、历史等一起规划时的基准）。
  # 与下面二选一：若本项非 0，则直接用字节数；若希望按「token×2」换算，可只写 max_context_tokens、省略本项。
  max_prompt_bytes: 220000
  # 仅当未配置 max_prompt_bytes（或为 0）时生效：实际字节上限 = 本值 × 2（默认 110000 → 220000 字节，与上面示例等价）。
  # max_context_tokens: 110000
  # 裁剪历史时至少保留最近几条消息（user/assistant/tool 一轮可能占多条），避免裁成空对话。
  min_transcript_messages: 6
  # 工作历史（多轮 user/assistant/tool 正文 + 工具名与 arguments）允许占用的 UTF-8 字节上限。
  # 0 = 自动：约为 max_prompt_bytes 的 42%（不低于 24k），且不超过「总上限 − 当前系统提示长度 − 5% slack」。
  history_max_bytes: 0
  # 系统提示里「## File-based memory」等文件记忆说明段（不含主模板其它部分）的最大字节；超出则截断。
  # 0 = 自动：约为总上限的 20%（不低于 8k）。
  system_extra_max_bytes: 0
  # 注入为 user 形的 agentMd（AGENT.md、规则、MEMORY 规则摘要等 <system-reminder> 大块）最大字节；超出则截断。
  # 0 = 自动：约为总上限的 22%（不低于 8k）。
  agent_md_max_bytes: 0
  # 系统提示中「Skills」索引与主线程工具目录列表的合并上限（名称 + 短描述）；0 = 自动约 1%（2k–24k）
  skill_index_max_bytes: 0
  # run_agent / fork_context 从父会话继承到子会话的「最近消息条数」上限；0 = 自动按总上限推算（约 max/800，夹在 12–80 条）。
  inherited_messages: 0
