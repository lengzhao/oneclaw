# 复制为同目录下的 live_llm.config.yaml 并填入 api_key（该文件已 gitignore）。
# 运行：go test -tags=live_llm ./test/e2e/... -run TestLiveLLM -count=1 -v
#
# 字段与仓库 config 包一致，见 docs/config.md

openai:
  api_key: "YOUR_API_KEY_HERE"
  # 可选；留空则走 SDK 默认官方地址。兼容网关时填写 base_url。
  # base_url: "https://api.openai.com/v1"

model: gpt-4o
